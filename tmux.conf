# RubyLLM Light tmux theme
set -g status-style "bg=default,fg=#9c8c80"
set -g status-left "#[fg=#f6f2ee,bg=#e24a2f,bold] #S #[bg=default] "
set -g status-right "#[fg=#e24a2f]#{?client_prefix,PREFIX ,}#{?window_zoomed_flag,ZOOM ,}#[fg=#9c8c80]#h "
set -g window-status-format "#[fg=#9c8c80] #I:#W "
set -g window-status-current-format "#[fg=#e24a2f,bold] #I:#W "
setw -g pane-border-style "fg=#c8bdb2"
setw -g pane-active-border-style "fg=#e24a2f"
set -g message-style "bg=default,fg=#e24a2f"
set -g message-command-style "bg=default,fg=#e24a2f"
set -g mode-style "bg=#e24a2f,fg=#f6f2ee"
setw -g clock-mode-colour "#e24a2f"
