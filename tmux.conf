# RubyLLM Light tmux theme
set -g status-style "bg=default,fg=#726f6c"
set -g status-left "#[fg=#faf9f7,bg=#b30000,bold] #S #[bg=default] "
set -g status-right "#[fg=#b30000]#{?client_prefix,PREFIX ,}#{?window_zoomed_flag,ZOOM ,}#[fg=#726f6c]#h "
set -g window-status-format "#[fg=#726f6c] #I:#W "
set -g window-status-current-format "#[fg=#b30000,bold] #I:#W "
setw -g pane-border-style "fg=#d4d0cd"
setw -g pane-active-border-style "fg=#b30000"
set -g message-style "bg=default,fg=#b30000"
set -g message-command-style "bg=default,fg=#b30000"
set -g mode-style "bg=#b30000,fg=#faf9f7"
setw -g clock-mode-colour "#b30000"
